name: Bug Report
description: Report a bug or unexpected behavior in MSK Core
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix it quickly.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I am running the latest release of msk_core
          required: true
        - label: I searched existing issues and this has not been reported yet
          required: true
        - label: My resource sets `lua54 'yes'` in its fxmanifest.lua
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Import msk_core in '...'
        2. Call '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output / errors
      description: Paste any relevant server or client console output. This will be rendered as code, no backticks needed.
      render: shell
  - type: input
    id: version
    attributes:
      label: msk_core version
      placeholder: "3.1.1"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - ESX
        - QBCore
        - ox_core
        - STANDALONE
        - Other
    validations:
      required: true
  - type: dropdown
    id: inventory
    attributes:
      label: Inventory
      options:
        - ox_inventory
        - core_inventory
        - jaksam_inventory
        - default (ESX / Chezza)
        - custom
        - Not relevant
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help, such as other resources involved or artifact version.
